<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Reverse OJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex-shrink-0 flex items-center">
                    <a href="#" class="text-2xl font-bold text-gray-800">Reverse OJ</a>
                </div>
                <div class="hidden sm:flex sm:items-center">
                    <a href="index.html" class="text-gray-800 px-3 py-2 rounded-md text-sm font-medium">Home</a>
                    <a href="contests.html" class="text-gray-800 px-3 py-2 rounded-md text-sm font-medium">Contests</a>
                    <a href="problems_page.html" class="text-gray-800 px-3 py-2 rounded-md text-sm font-medium">Problems</a>
                    <a href="blogs.html" class="text-gray-800 px-3 py-2 rounded-md text-sm font-medium">Blogs</a>
                    <a href="leaderboard.html" class="text-gray-800 px-3 py-2 rounded-md text-sm font-medium">Leaderboard</a>
                    <a href="login.html" class="text-gray-800 px-3 py-2 rounded-md text-sm font-medium">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!--HEADER-->
    <header class="bg-blue-500 text-white py-12">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-4xl font-bold">Leaderboard</h1>
            <p class="mt-4 text-lg">See how you rank among the best!</p>
        </div>
    </header>

    <!-- Leaderboard Section -->
    <section class="py-12">
        <div class="max-w-7xl mx-auto">
            <div class="bg-white shadow-md rounded-lg">
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white">
                        <thead>
                            <tr class="bg-gray-200 text-left text-sm uppercase font-bold text-gray-700 tracking-wider">
                                <th class="px-6 py-4">Rank</th>
                                <th class="px-6 py-4">Username</th>
                                <th class="px-6 py-4">Rating</th>
                                <th class="px-6 py-4">Problems Solved</th>
                            </tr>
                        </thead>
                        <tbody class="text-gray-700">
                            <tr class="border-t border-gray-300">
                                <td class="px-6 py-4">1</td>
                                <td class="px-6 py-4">Alice</td>
                                <td class="px-6 py-4">1500</td>
                                <td class="px-6 py-4">25</td>
                            </tr>
                            <tr class="border-t border-gray-300">
                                <td class="px-6 py-4">2</td>
                                <td class="px-6 py-4">Bob</td>
                                <td class="px-6 py-4">1450</td>
                                <td class="px-6 py-4">23</td>
                            </tr>
                            <tr class="border-t border-gray-300">
                                <td class="px-6 py-4">3</td>
                                <td class="px-6 py-4">Charlie</td>
                                <td class="px-6 py-4">1400</td>
                                <td class="px-6 py-4">20</td>
                            </tr>
                            <tr class="border-t border-gray-300">
                                <td class="px-6 py-4">4</td>
                                <td class="px-6 py-4">David</td>
                                <td class="px-6 py-4">1350</td>
                                <td class="px-6 py-4">18</td>
                            </tr>
                            <tr class="border-t border-gray-300">
                                <td class="px-6 py-4">5</td>
                                <td class="px-6 py-4">Eve</td>
                                <td class="px-6 py-4">1300</td>
                                <td class="px-6 py-4">15</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-4">
        <div class="max-w-7xl mx-auto text-center">
            <p>&copy; 2024 Reverse OJ. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
